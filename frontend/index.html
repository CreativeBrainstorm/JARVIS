<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JARVIS — Personal AI Assistant HUD Interface">
    <title>J.A.R.V.I.S. — AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/jarvis.css">
    <link rel="stylesheet" href="/css/jarvis-extra.css">
</head>
<body>
    <!-- Animated background -->
    <div id="bg-canvas-container">
        <canvas id="bg-canvas"></canvas>
    </div>

    <!-- Scan line overlay -->
    <div class="scanline-overlay"></div>

    <!-- Main HUD Layout -->
    <div class="hud-container">

        <!-- Top Bar -->
        <header class="hud-topbar">
            <div class="topbar-left">
                <div class="jarvis-logo">
                    <span class="logo-bracket">[</span>
                    <span class="logo-text">J.A.R.V.I.S.</span>
                    <span class="logo-bracket">]</span>
                </div>
                <span class="version-tag">v0.1.0</span>
            </div>
            <div class="topbar-center">
                <div class="status-indicator online" id="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-text" id="status-text">SYSTEMS ONLINE</span>
                </div>
            </div>
            <div class="topbar-right">
                <div class="clock" id="hud-clock">--:--:--</div>
                <div class="date" id="hud-date">----.--.--</div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="hud-main">

            <!-- Left Sidebar — System Info -->
            <aside class="hud-sidebar left-sidebar">
                <div class="sidebar-panel" id="neurons-panel">
                    <h3 class="panel-title">
                        <span class="panel-icon">◆</span> NEURONS
                    </h3>
                    <div class="neuron-list" id="neuron-list">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </aside>

            <!-- Center — Chat Area -->
            <section class="hud-chat">
                <div class="chat-messages" id="chat-messages">
                    <!-- Messages populated by JS -->
                </div>

                <!-- Typing indicator -->
                <div class="typing-indicator" id="typing-indicator" style="display: none;">
                    <div class="typing-dots">
                        <span></span><span></span><span></span>
                    </div>
                    <span class="typing-text">JARVIS is processing</span>
                </div>

                <!-- Live voice transcript (interim) -->
                <div class="voice-transcript" id="voice-transcript" style="display: none;">
                    <span class="vt-prefix">▌</span>
                    <span class="vt-text" id="voice-transcript-text"></span>
                </div>

                <!-- Input Area -->
                <div class="chat-input-container">
                    <div class="input-glow"></div>
                    <div class="chat-input-wrapper">
                        <span class="input-prefix">❯</span>
                        <input
                            type="text"
                            id="chat-input"
                            class="chat-input"
                            placeholder="Speak to JARVIS..."
                            autocomplete="off"
                            spellcheck="false"
                        >
                        <button class="mic-btn is-off" id="mic-btn" title="Voice mode (off)" aria-label="Toggle voice mode">
                            <svg class="mic-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                <line x1="12" y1="19" x2="12" y2="23"></line>
                                <line x1="8" y1="23" x2="16" y2="23"></line>
                            </svg>
                            <span class="mic-pulse"></span>
                        </button>
                        <button class="send-btn" id="send-btn" title="Send">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Right Sidebar — Activity Feed -->
            <aside class="hud-sidebar right-sidebar">
                <div class="sidebar-panel">
                    <h3 class="panel-title">
                        <span class="panel-icon">◆</span> ACTIVITY LOG
                    </h3>
                    <div class="activity-feed" id="activity-feed">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div class="sidebar-panel" id="neural-panel">
                    <div class="molecule-container" id="molecule"></div>
                </div>

            </aside>

        </main>

        <!-- Bottom Bar -->
        <footer class="hud-bottombar">
            <div class="bottombar-left">
                <span class="connection-status" id="ws-status">
                    <span class="ws-dot disconnected"></span> DISCONNECTED
                </span>
            </div>
            <div class="bottombar-center">
                <span class="powered-by">POWERED BY ADVANCED AI</span>
            </div>
            <div class="bottombar-right">
                <span class="msg-count" id="msg-count">Messages: 0</span>
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
